<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Experiment</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="center-screen">
    <div class="home-card">
      <span class="pill">Reading experiment</span>
      <h1>How fast do you read?</h1>
      <p class="subtitle">
        You'll read a short passage at your own pace. We'll measure how long it
        takes, then ask a few comprehension questions.
      </p>
      <p class="note">
        The timer starts automatically when the passage loads. Read carefully —
        there's a quiz afterward!
      </p>
      <a href="reading.html" class="btn btn-primary">Start experiment →</a>
    </div>
  </main>
</body>
</html>
